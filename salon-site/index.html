<!DOCTYPE html>
<html lang="ja">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Salon Lumière</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <header>
            <nav>
            <h1 class="logo">Salon Lumière</h1>

                <ul class="nav-links">
                    <li><a href="#about">About</a></li>
                    <li><a href="#menu">Menu</a></li>
                    <li><a href="#gallery">Gallery</a></li>
                    <li><a href="#access">Access</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>
        </header>

        <section class="hero">
            <div class="hero-text">
                <h2>美しさを引き出すヘアサロン</h2>
                <p>あなたに似合うスタイルをご提案します</p>
                <a href="#contact" class="cta-button">
                ご予約はこちら
                </a>
            </div>
        </section>


        <section id="about">
            <h2>About</h2>
            <p>
            Salon Lumièreは落ち着いた空間で
            あなたに最適なヘアスタイルを提案する美容院です。
            </p>
        </section>


        <section id="menu">
        <h2>Menu</h2>
            <div class="menu-container">
                <div class="menu-card">
                    <h3>カット</h3>
                    <p>¥5000</p>
                </div>
                <div class="menu-card">
                    <h3>カラー</h3>
                    <p>¥7000</p>
                </div>
                <div class="menu-card">
                    <h3>パーマ</h3>
                    <p>¥8000</p>
                </div>
            </div>
        </section>

        <section id="gallery">
            <h2>Gallery</h2>
            <div class="gallery-container">
                <img src="images/style1.jpg">
                <img src="images/style2.jpg">
                <img src="images/style3.jpg">
            </div>
        </section>

        <section id="access">
            <h2>Access</h2>
            <p>東京都〇〇区〇〇</p>
        </section>

        <section id="contact">
            <h2>Contact</h2>
            <p>ご予約はお電話またはメールでお願いします</p>
        </section>

        <footer>
            <p>© 2026 Salon Lumière</p>
        </footer>

    </body>
</html>
